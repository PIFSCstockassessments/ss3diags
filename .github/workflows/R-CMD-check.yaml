# Workflow derived from https://github.com/r-lib/actions/tree/master/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    paths-ignore:
      - 'README.md'
  pull_request:

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,   r: 'release'}
          - {os: macOS-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v3
      
      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: Create R cache directories (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p ~/Library/Caches/org.R-project.R/R/renv/binary/macos/R-4.5/aarch64-apple-darwin20/repository
          chmod -R 755 ~/Library/Caches/org.R-project.R

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
 
      - name: Install devtools
        shell: Rscript {0}
        run: renv::install("devtools")

      - name: Install ss3diags package for testing
        shell: Rscript {0}
        run: devtools::install(dependencies=FALSE)
        
      - name: Install rcmdcheck
        shell: Rscript {0}
        run: renv::install("rcmdcheck")

      - name: Install remotes
        shell: Rscript {0}
        run: renv::install("remotes")

      - name: Debug test setup
        run: |
          cat("=== Debugging test environment ===\n")
          cat("Working directory:", getwd(), "\n")
          cat("Files in root:", paste(list.files("."), collapse = ", "), "\n")
          
          if (dir.exists("tests")) {
            cat("Files in tests/:", paste(list.files("tests"), collapse = ", "), "\n")
            if (dir.exists("tests/testthat")) {
              cat("Test files found:", paste(list.files("tests/testthat", pattern = "test.*\\.[rR]$"), collapse = ", "), "\n")
            }
          }
          
          cat("Environment variables:\n")
          cat("CI =", Sys.getenv("CI"), "\n")
          cat("GITHUB_ACTIONS =", Sys.getenv("GITHUB_ACTIONS"), "\n")
          
          cat("=== Checking if testthat.R runs ===\n")
          if (file.exists("tests/testthat.R")) {
            cat("testthat.R exists\n")
            tryCatch({
              source("tests/testthat.R")
              cat("testthat.R ran successfully\n")
            }, error = function(e) {
              cat("Error in testthat.R:", conditionMessage(e), "\n")
              traceback()
            })
          } else {
            cat("testthat.R not found\n")
          }
        shell: Rscript {0}

      - name: Try running tests directly
        run: |
          cat("=== Trying devtools::test() ===\n")
          tryCatch({
            devtools::test()
          }, error = function(e) {
            cat("Error in devtools::test():", conditionMessage(e), "\n")
            print(e)
          })
        shell: Rscript {0}

      - name: Try running tests with testthat directly
        run: |
          cat("=== Trying testthat::test_dir() ===\n")
          tryCatch({
            testthat::test_dir("tests/testthat")
          }, error = function(e) {
            cat("Error in test_dir():", conditionMessage(e), "\n")
            print(e)
          })
        shell: Rscript {0}

      - uses: r-lib/actions/check-r-package@v2
        with: 
          error-on: '"error"'


    



